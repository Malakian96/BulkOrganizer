services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bulk_organizer

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/bulk_organizer
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://backend:4000

volumes:
  mongo_data:
