services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/bulk_organizer
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000

volumes:
  mongo_data_dev:
